<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Jeeves</title>
  <link rel="manifest" href="/app/manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0f172a; --surface: #1e293b; --border: #334155;
      --text: #f1f5f9; --muted: #94a3b8; --accent: #3b82f6;
      --green: #22c55e; --red: #ef4444; --orange: #f59e0b;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      height: 100dvh; display: flex; flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* Header */
    .header {
      padding: 12px 16px; background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .header h1 { font-size: 18px; font-weight: 600; }
    .header .status { font-size: 12px; color: var(--green); }
    .header .countdown {
      font-size: 11px; color: var(--orange); font-weight: 500;
    }

    /* Tabs */
    .tabs {
      display: flex; background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .tab {
      flex: 1; padding: 10px 8px; text-align: center; font-size: 12px;
      color: var(--muted); cursor: pointer; border: none; background: none;
      font-weight: 500; transition: color 0.2s;
    }
    .tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

    /* Content */
    .content { flex: 1; overflow-y: auto; padding: 16px; }

    /* Chat */
    .messages { display: flex; flex-direction: column; gap: 12px; padding-bottom: 80px; }
    .msg {
      max-width: 85%; padding: 10px 14px; border-radius: 16px;
      font-size: 14px; line-height: 1.5; word-wrap: break-word;
    }
    .msg.user {
      align-self: flex-end; background: var(--accent); color: white;
      border-bottom-right-radius: 4px;
    }
    .msg.jeeves {
      align-self: flex-start; background: var(--surface);
      border: 1px solid var(--border); border-bottom-left-radius: 4px;
    }
    .msg.system {
      align-self: center; background: transparent; color: var(--muted);
      font-size: 12px; text-align: center; max-width: 100%;
    }

    /* Input */
    .input-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 12px 16px; background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex; gap: 8px; align-items: center;
    }
    .input-bar input {
      flex: 1; padding: 10px 14px; border-radius: 20px;
      border: 1px solid var(--border); background: var(--bg);
      color: var(--text); font-size: 14px; outline: none;
    }
    .input-bar input:focus { border-color: var(--accent); }
    .input-bar button {
      width: 40px; height: 40px; border-radius: 50%;
      border: none; cursor: pointer; display: flex;
      align-items: center; justify-content: center; font-size: 18px;
    }
    .btn-send { background: var(--accent); color: white; }
    .btn-mic { background: var(--surface); color: var(--muted); border: 1px solid var(--border) !important; }
    .btn-mic.recording { background: var(--red); color: white; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }

    /* Briefing */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px; margin-bottom: 12px;
    }
    .card h3 { font-size: 14px; font-weight: 600; margin-bottom: 8px; color: var(--accent); }
    .card p, .card li { font-size: 13px; line-height: 1.6; color: var(--muted); }
    .card ul { padding-left: 16px; }

    /* Quick actions */
    .quick-actions {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px;
    }
    .quick-btn {
      padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text); font-size: 12px;
      cursor: pointer; text-align: left; transition: border-color 0.2s;
    }
    .quick-btn:active { border-color: var(--accent); }

    /* Goals */
    .goal-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 0; border-bottom: 1px solid var(--border);
    }
    .goal-item:last-child { border-bottom: none; }
    .goal-label { font-size: 13px; flex: 1; }
    .goal-bar {
      width: 80px; height: 6px; background: var(--border);
      border-radius: 3px; overflow: hidden; margin: 0 12px;
    }
    .goal-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
    .goal-pct { font-size: 12px; color: var(--muted); min-width: 36px; text-align: right; }

    .hidden { display: none; }
    .loading { color: var(--muted); font-size: 13px; text-align: center; padding: 20px; }
  </style>
</head>
<body>

<div class="header">
  <div>
    <h1>Jeeves</h1>
    <div class="status" id="status-text">Connecting...</div>
  </div>
  <div class="countdown" id="countdown"></div>
</div>

<div class="tabs">
  <button class="tab active" data-tab="chat">Chat</button>
  <button class="tab" data-tab="briefing">Briefing</button>
  <button class="tab" data-tab="goals">Goals</button>
  <button class="tab" data-tab="observe">Log</button>
</div>

<!-- Chat Tab -->
<div class="content" id="tab-chat">
  <div class="messages" id="messages">
    <div class="msg system">Talk to Jeeves. Every response is grounded in your goals and behavior.</div>
  </div>
</div>

<!-- Briefing Tab -->
<div class="content hidden" id="tab-briefing">
  <div class="loading" id="briefing-loading">Loading briefing...</div>
  <div id="briefing-content"></div>
</div>

<!-- Goals Tab -->
<div class="content hidden" id="tab-goals">
  <div class="loading" id="goals-loading">Loading goals...</div>
  <div id="goals-list"></div>
</div>

<!-- Observe Tab -->
<div class="content hidden" id="tab-observe">
  <div class="card">
    <h3>Quick Log</h3>
    <p>Record what you did, skipped, or felt.</p>
    <div class="quick-actions" id="quick-actions">
      <button class="quick-btn" data-obs="action|health|Exercised">Exercised</button>
      <button class="quick-btn" data-obs="skip|health|Skipped exercise">Skipped Gym</button>
      <button class="quick-btn" data-obs="action|health|Cooked at home">Cooked</button>
      <button class="quick-btn" data-obs="action|health|Ate out">Ate Out</button>
      <button class="quick-btn" data-obs="action|business|Worked on marketing">Did Marketing</button>
      <button class="quick-btn" data-obs="skip|business|Avoided marketing">Avoided Marketing</button>
      <button class="quick-btn" data-obs="action|business|Worked on app code">Built Code</button>
      <button class="quick-btn" data-obs="defer|finance|Deferred IRS task">Deferred IRS</button>
    </div>
  </div>
  <div id="observe-feedback" style="margin-top:12px;"></div>
</div>

<!-- Input bar (chat only) -->
<div class="input-bar" id="input-bar">
  <button class="btn-mic" id="mic-btn" title="Voice input">🎤</button>
  <input type="text" id="msg-input" placeholder="Talk to Jeeves..." autocomplete="off">
  <button class="btn-send" id="send-btn">→</button>
</div>

<script>
const API = window.location.origin;
const AUTH = 'Bearer iq-sdcQllQKb9ye7AEIeCGGbMs2Ej9T6FKwLheYrcow';
const headers = { 'Authorization': AUTH, 'Content-Type': 'application/json' };

// ── Tabs ──────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.content').forEach(c => c.classList.add('hidden'));
    tab.classList.add('active');
    const target = tab.dataset.tab;
    document.getElementById('tab-' + target).classList.remove('hidden');
    document.getElementById('input-bar').style.display = target === 'chat' ? 'flex' : 'none';
    if (target === 'briefing') loadBriefing();
    if (target === 'goals') loadGoals();
  });
});

// ── Health check ──────────────────────────────────────────
async function checkHealth() {
  try {
    const r = await fetch(API + '/health', { headers });
    const d = await r.json();
    document.getElementById('status-text').textContent = d.status === 'alive' ? 'Connected' : 'Error';
    document.getElementById('status-text').style.color = d.status === 'alive' ? 'var(--green)' : 'var(--red)';
    if (d.brain) {
      document.getElementById('countdown').textContent = d.brain.retirement_days + 'd to retire';
    }
  } catch(e) {
    document.getElementById('status-text').textContent = 'Offline';
    document.getElementById('status-text').style.color = 'var(--red)';
  }
}
checkHealth();

// ── Chat ──────────────────────────────────────────────────
const messagesDiv = document.getElementById('messages');
const msgInput = document.getElementById('msg-input');

function addMsg(text, role) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  messagesDiv.appendChild(div);
  div.scrollIntoView({ behavior: 'smooth' });
}

async function sendMsg() {
  const text = msgInput.value.trim();
  if (!text) return;
  msgInput.value = '';
  addMsg(text, 'user');
  addMsg('Thinking...', 'system');

  try {
    const r = await fetch(API + '/chat', {
      method: 'POST', headers,
      body: JSON.stringify({ message: text })
    });
    const d = await r.json();
    messagesDiv.lastChild.remove(); // remove "Thinking..."
    addMsg(d.response || d.detail || 'No response', 'jeeves');
  } catch(e) {
    messagesDiv.lastChild.remove();
    addMsg('Error: ' + e.message, 'system');
  }
}

document.getElementById('send-btn').addEventListener('click', sendMsg);
msgInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMsg(); });

// ── Voice ─────────────────────────────────────────────────
const micBtn = document.getElementById('mic-btn');
let recognition = null;
if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.lang = 'en-US';

  let recording = false;
  micBtn.addEventListener('click', () => {
    if (recording) {
      recognition.stop();
      micBtn.classList.remove('recording');
      recording = false;
    } else {
      recognition.start();
      micBtn.classList.add('recording');
      recording = true;
    }
  });

  recognition.onresult = (e) => {
    const text = e.results[0][0].transcript;
    msgInput.value = text;
    micBtn.classList.remove('recording');
    recording = false;
    sendMsg();
  };

  recognition.onerror = () => {
    micBtn.classList.remove('recording');
    recording = false;
  };
  recognition.onend = () => {
    micBtn.classList.remove('recording');
    recording = false;
  };
} else {
  micBtn.style.display = 'none';
}

// ── Briefing ──────────────────────────────────────────────
async function loadBriefing() {
  const content = document.getElementById('briefing-content');
  const loading = document.getElementById('briefing-loading');
  loading.style.display = 'block';
  content.innerHTML = '';

  try {
    // Get structured data
    const [retireR, contraR, priorityR] = await Promise.all([
      fetch(API + '/review/retirement', { headers }),
      fetch(API + '/review/contradictions', { headers }),
      fetch(API + '/review/what-matters-now', { headers }),
    ]);
    const retire = await retireR.json();
    const contra = await contraR.json();
    const priorities = await priorityR.json();

    loading.style.display = 'none';

    // Retirement card
    content.innerHTML += `<div class="card">
      <h3>Retirement Countdown</h3>
      <p><strong>${retire.days_left} days</strong> left (${retire.months_left} months)</p>
      <p>Need: <strong>$${retire.monthly_needed?.toLocaleString()}/month</strong></p>
    </div>`;

    // Priorities card
    let priHtml = '<div class="card"><h3>What Matters Now</h3><ul>';
    (priorities.priorities || []).forEach((p, i) => {
      priHtml += `<li><strong>#${i+1}</strong> ${p.label}: ${Math.round(p.effective_weight*100)}%</li>`;
    });
    priHtml += '</ul></div>';
    content.innerHTML += priHtml;

    // Contradictions card
    const contras = contra.contradictions || [];
    if (contras.length > 0) {
      let cHtml = '<div class="card"><h3>Contradictions</h3><ul>';
      contras.slice(0, 5).forEach(c => {
        const sev = c.severity === 'critical' ? '🔴' : c.severity === 'warning' ? '🟡' : '🔵';
        cHtml += `<li>${sev} ${c.label}: says ${Math.round(c.stated_weight*100)}%, does ${Math.round(c.revealed_weight*100)}%</li>`;
      });
      cHtml += '</ul></div>';
      content.innerHTML += cHtml;
    }
  } catch(e) {
    loading.style.display = 'none';
    content.innerHTML = `<div class="card"><h3>Error</h3><p>${e.message}</p></div>`;
  }
}

// ── Goals ─────────────────────────────────────────────────
async function loadGoals() {
  const list = document.getElementById('goals-list');
  const loading = document.getElementById('goals-loading');
  loading.style.display = 'block';
  list.innerHTML = '';

  try {
    const r = await fetch(API + '/review/goals', { headers });
    const d = await r.json();
    loading.style.display = 'none';

    (d.goals || []).forEach(g => {
      const ew = Math.round((g.effective_weight || 0) * 100);
      const sw = Math.round((g.stated_weight || 0) * 100);
      const cs = g.contradiction_score || 0;
      const color = cs > 0.5 ? 'var(--red)' : cs > 0.3 ? 'var(--orange)' : 'var(--green)';
      list.innerHTML += `<div class="goal-item">
        <span class="goal-label">${g.label}</span>
        <div class="goal-bar"><div class="goal-fill" style="width:${ew}%;background:${color}"></div></div>
        <span class="goal-pct">${ew}%</span>
      </div>`;
    });
  } catch(e) {
    loading.style.display = 'none';
    list.innerHTML = `<p class="loading">Error: ${e.message}</p>`;
  }
}

// ── Quick Observe ─────────────────────────────────────────
document.getElementById('quick-actions').addEventListener('click', async (e) => {
  const btn = e.target.closest('[data-obs]');
  if (!btn) return;
  const [type, cat, desc] = btn.dataset.obs.split('|');
  const feedback = document.getElementById('observe-feedback');

  btn.style.opacity = '0.5';
  try {
    const r = await fetch(API + `/ingest/observe?observation_type=${type}&category=${cat}&description=${encodeURIComponent(desc)}&value=1.0`, {
      method: 'POST', headers
    });
    const d = await r.json();
    feedback.innerHTML = `<div class="card"><h3>Logged</h3><p>${desc} (${type})</p></div>`;
    btn.style.opacity = '1';
  } catch(e) {
    feedback.innerHTML = `<div class="card"><h3>Error</h3><p>${e.message}</p></div>`;
    btn.style.opacity = '1';
  }
});

// ── Service Worker ────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/app/sw.js');
}
</script>
</body>
</html>
